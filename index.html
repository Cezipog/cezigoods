<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Biblioteca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', 'Segoe UI', sans-serif;
  background: #0a0a0f;
  color: #e4e4e7;
  min-height: 100vh;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 30px 20px;
}

/* Header */
header {
  text-align: center;
  margin-bottom: 40px;
}

header h1 {
  font-size: 2.2rem;
  font-weight: 700;
  background: linear-gradient(135deg, #a78bfa, #7c3aed, #6d28d9);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}

header p {
  color: #71717a;
  font-size: 0.95rem;
}

/* Search bar */
.search-bar {
  display: flex;
  align-items: center;
  max-width: 500px;
  margin: 0 auto 24px;
  position: relative;
}

.search-bar input {
  width: 100%;
  padding: 12px 16px 12px 42px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.08);
  color: #e4e4e7;
  border-radius: 12px;
  font-family: inherit;
  font-size: 0.9rem;
  transition: all 0.2s ease;
  outline: none;
}

.search-bar input:focus {
  border-color: #7c3aed;
  box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
}

.search-bar .search-icon {
  position: absolute;
  left: 14px;
  color: #71717a;
  font-size: 1rem;
  pointer-events: none;
}

/* Toggle form button */
.toggle-form-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 0 auto 24px;
  padding: 12px 28px;
  background: linear-gradient(135deg, #7c3aed, #6d28d9);
  border: none;
  color: white;
  font-family: inherit;
  font-size: 0.95rem;
  font-weight: 600;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
}

.toggle-form-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 28px rgba(124, 58, 237, 0.45);
}

.toggle-form-btn .icon {
  font-size: 1.2rem;
  transition: transform 0.3s ease;
}

.toggle-form-btn.active .icon {
  transform: rotate(45deg);
}

/* Form */
.form-wrapper {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease, opacity 0.3s ease;
  opacity: 0;
}

.form-wrapper.open {
  max-height: 700px;
  opacity: 1;
}

form {
  background: linear-gradient(145deg, #16161e, #1a1a24);
  padding: 28px;
  border-radius: 16px;
  margin-bottom: 32px;
  border: 1px solid rgba(124, 58, 237, 0.15);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.form-grid .full-width {
  grid-column: 1 / -1;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.form-group label {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: #a1a1aa;
}

input, select, textarea {
  width: 100%;
  padding: 11px 14px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.08);
  color: #e4e4e7;
  border-radius: 10px;
  font-family: inherit;
  font-size: 0.9rem;
  transition: all 0.2s ease;
  outline: none;
}

input:focus, select:focus, textarea:focus {
  border-color: #7c3aed;
  box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
}

textarea {
  resize: vertical;
  min-height: 70px;
}

input[type="file"] {
  padding: 9px 14px;
  cursor: pointer;
}

input[type="file"]::file-selector-button {
  background: rgba(124, 58, 237, 0.2);
  border: 1px solid rgba(124, 58, 237, 0.3);
  color: #a78bfa;
  padding: 4px 12px;
  border-radius: 6px;
  font-family: inherit;
  font-size: 0.8rem;
  cursor: pointer;
  margin-right: 10px;
  transition: background 0.2s;
}

input[type="file"]::file-selector-button:hover {
  background: rgba(124, 58, 237, 0.35);
}

.checkbox-group {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  padding: 6px 0;
}

.radio-wrapper {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
}

.radio-wrapper input[type="radio"] {
  width: 16px;
  height: 16px;
  accent-color: #7c3aed;
  cursor: pointer;
}

.radio-wrapper label {
  font-size: 0.85rem;
  color: #a1a1aa;
  cursor: pointer;
  text-transform: none;
  letter-spacing: 0;
  font-weight: 500;
}

.form-actions {
  display: flex;
  gap: 10px;
  margin-top: 6px;
}

button {
  padding: 11px 20px;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 10px;
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 600;
  transition: all 0.2s ease;
}

.btn-primary {
  flex: 1;
  background: linear-gradient(135deg, #7c3aed, #6d28d9);
  box-shadow: 0 4px 16px rgba(124, 58, 237, 0.3);
}

.btn-primary:hover {
  box-shadow: 0 6px 24px rgba(124, 58, 237, 0.45);
  transform: translateY(-1px);
}

.btn-secondary {
  flex: 1;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.btn-secondary:hover {
  background: rgba(255, 255, 255, 0.1);
}

/* Content filter bar */
.content-filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
}

.content-filter-btn {
  padding: 8px 18px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.08);
  color: #a1a1aa;
  font-size: 0.82rem;
  font-weight: 500;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.content-filter-btn:hover {
  background: rgba(124, 58, 237, 0.1);
  border-color: rgba(124, 58, 237, 0.3);
  color: #a78bfa;
}

.content-filter-btn.active {
  background: rgba(124, 58, 237, 0.2);
  border-color: #7c3aed;
  color: #a78bfa;
}

.content-filter-btn.nsfw-btn.active {
  background: rgba(239, 68, 68, 0.2);
  border-color: #ef4444;
  color: #f87171;
}

.content-filter-btn.hentai-btn.active {
  background: rgba(236, 72, 153, 0.2);
  border-color: #ec4899;
  color: #f472b6;
}

/* Filter bar (toolbar row) */
.filter-toolbar {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
  flex-wrap: wrap;
  align-items: center;
}

/* Dropdown wrappers */
.dropdown-wrapper {
  position: relative;
}

.dropdown-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 16px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.08);
  color: #a1a1aa;
  font-size: 0.82rem;
  font-weight: 500;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
}

.dropdown-btn:hover {
  background: rgba(124, 58, 237, 0.1);
  border-color: rgba(124, 58, 237, 0.3);
  color: #a78bfa;
}

.dropdown-btn.active {
  background: rgba(124, 58, 237, 0.2);
  border-color: #7c3aed;
  color: #a78bfa;
}

.dropdown-btn .dd-arrow {
  font-size: 0.6rem;
  transition: transform 0.2s ease;
  opacity: 0.6;
}

.dropdown-btn.open .dd-arrow {
  transform: rotate(180deg);
}

.dropdown-menu {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  min-width: 180px;
  background: #1a1a24;
  border: 1px solid rgba(124, 58, 237, 0.2);
  border-radius: 12px;
  padding: 6px;
  z-index: 100;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  opacity: 0;
  pointer-events: none;
  transform: translateY(-6px);
  transition: opacity 0.18s ease, transform 0.18s ease;
}

.dropdown-menu.open {
  opacity: 1;
  pointer-events: all;
  transform: translateY(0);
}

.dropdown-item {
  display: flex;
  align-items: center;
  gap: 9px;
  width: 100%;
  padding: 9px 12px;
  background: none;
  border: none;
  color: #a1a1aa;
  font-size: 0.82rem;
  font-weight: 500;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s ease;
  text-align: left;
  font-family: inherit;
}

.dropdown-item:hover {
  background: rgba(124, 58, 237, 0.12);
  color: #c4b5fd;
}

.dropdown-item.selected {
  background: rgba(124, 58, 237, 0.2);
  color: #a78bfa;
}

.dropdown-item .dd-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0;
  flex-shrink: 0;
}

.dropdown-item.selected .dd-dot {
  opacity: 1;
}

.dropdown-divider {
  height: 1px;
  background: rgba(255,255,255,0.06);
  margin: 5px 6px;
}

/* Blur toggle button */
.blur-toggle-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 16px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.08);
  color: #a1a1aa;
  font-size: 0.82rem;
  font-weight: 500;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.blur-toggle-btn:hover {
  background: rgba(250, 204, 21, 0.08);
  border-color: rgba(250, 204, 21, 0.3);
  color: #fde047;
}

.blur-toggle-btn.unblurred {
  background: rgba(250, 204, 21, 0.12);
  border-color: rgba(250, 204, 21, 0.4);
  color: #fde047;
}

.blur-toggle-btn .blur-icon {
  font-size: 0.95rem;
}

/* Stats */
.stats {
  display: flex;
  gap: 16px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.stat-card {
  background: linear-gradient(145deg, #16161e, #1a1a24);
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: 12px;
  padding: 14px 20px;
  flex: 1;
  min-width: 120px;
  text-align: center;
}

.stat-card .stat-value {
  font-size: 1.5rem;
  font-weight: 700;
  color: #a78bfa;
}

.stat-card .stat-label {
  font-size: 0.72rem;
  color: #71717a;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-top: 2px;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
}

.card {
  background: linear-gradient(145deg, #16161e, #1a1a24);
  border-radius: 14px;
  overflow: hidden;
  transition: all 0.3s ease;
  border: 1px solid rgba(255, 255, 255, 0.05);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
  border-color: rgba(124, 58, 237, 0.2);
}

.card-image {
  position: relative;
  overflow: hidden;
}

.card-image img {
  width: 100%;
  height: 280px;
  object-fit: cover;
  transition: transform 0.4s ease, filter 0.3s ease;
}

.card-image img.blurred {
  filter: blur(20px) brightness(0.5);
}

.card-image .blur-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0.3);
  color: #f87171;
  font-size: 0.8rem;
  font-weight: 600;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.card-image img.blurred + .type-badge ~ .blur-overlay,
.card-image .blur-overlay.visible {
  opacity: 1;
}

.card:hover .card-image img:not(.blurred) {
  transform: scale(1.05);
}

.card-image .type-badge {
  position: absolute;
  top: 10px;
  left: 10px;
  padding: 4px 10px;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(8px);
  border-radius: 8px;
  font-size: 0.7rem;
  font-weight: 600;
  color: #d4d4d8;
  letter-spacing: 0.03em;
  z-index: 2;
}

.card-image .rating-badge {
  position: absolute;
  top: 10px;
  right: 10px;
  padding: 4px 10px;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(8px);
  border-radius: 8px;
  font-size: 0.8rem;
  font-weight: 700;
  color: #facc15;
  z-index: 2;
}

.card-image .content-rating-badge {
  position: absolute;
  bottom: 10px;
  left: 10px;
  padding: 4px 10px;
  backdrop-filter: blur(8px);
  border-radius: 8px;
  font-size: 0.68rem;
  font-weight: 700;
  z-index: 2;
  letter-spacing: 0.03em;
}

.content-rating-badge.nsfw-badge {
  background: rgba(239, 68, 68, 0.8);
  color: #fff;
}

.content-rating-badge.hentai-badge {
  background: rgba(236, 72, 153, 0.8);
  color: #fff;
}

.card-content {
  padding: 14px;
}

.card-content .card-title {
  font-weight: 600;
  font-size: 0.95rem;
  margin-bottom: 8px;
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.badges {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.02em;
}

.badge.nsfw {
  background: rgba(239, 68, 68, 0.15);
  color: #f87171;
  border: 1px solid rgba(239, 68, 68, 0.25);
}

.badge.hentai {
  background: rgba(236, 72, 153, 0.15);
  color: #f472b6;
  border: 1px solid rgba(236, 72, 153, 0.25);
}

.badge.status-lendo {
  background: rgba(59, 130, 246, 0.15);
  color: #60a5fa;
  border: 1px solid rgba(59, 130, 246, 0.25);
}

.badge.status-completo {
  background: rgba(34, 197, 94, 0.15);
  color: #4ade80;
  border: 1px solid rgba(34, 197, 94, 0.25);
}

.badge.status-dropado {
  background: rgba(239, 68, 68, 0.15);
  color: #f87171;
  border: 1px solid rgba(239, 68, 68, 0.25);
}

.badge.status-planejo {
  background: rgba(168, 85, 247, 0.15);
  color: #c084fc;
  border: 1px solid rgba(168, 85, 247, 0.25);
}

.review-section {
  margin-top: 8px;
}

.review-toggle {
  width: 100%;
  padding: 6px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.06);
  color: #71717a;
  font-size: 0.75rem;
  font-weight: 500;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.review-toggle:hover {
  background: rgba(255, 255, 255, 0.08);
  color: #a1a1aa;
}

.review-text {
  display: none;
  font-size: 0.8rem;
  line-height: 1.5;
  margin-top: 8px;
  padding: 10px;
  background: rgba(0, 0, 0, 0.2);
  border-radius: 8px;
  color: #a1a1aa;
}

.actions {
  display: flex;
  gap: 6px;
  margin-top: 10px;
}

.actions button {
  flex: 1;
  padding: 8px;
  font-size: 0.78rem;
  font-weight: 500;
  border-radius: 8px;
}

.btn-edit {
  background: rgba(124, 58, 237, 0.15);
  color: #a78bfa;
  border: 1px solid rgba(124, 58, 237, 0.2);
}

.btn-edit:hover {
  background: rgba(124, 58, 237, 0.25);
}

.btn-delete {
  background: rgba(239, 68, 68, 0.1);
  color: #f87171;
  border: 1px solid rgba(239, 68, 68, 0.15);
}

.btn-delete:hover {
  background: rgba(239, 68, 68, 0.2);
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  grid-column: 1 / -1;
}

.empty-state .icon {
  font-size: 3rem;
  margin-bottom: 16px;
  opacity: 0.5;
}

.empty-state p {
  color: #52525b;
  font-size: 0.95rem;
}

/* Toast notification */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  padding: 12px 24px;
  background: rgba(124, 58, 237, 0.9);
  backdrop-filter: blur(10px);
  color: #fff;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 500;
  border-radius: 12px;
  z-index: 1000;
  transition: transform 0.3s ease, opacity 0.3s ease;
  opacity: 0;
  pointer-events: none;
}

.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* Scrollbar */
::-webkit-scrollbar {
  width: 8px;
}

::-webkit-scrollbar-track {
  background: #0a0a0f;
}

::-webkit-scrollbar-thumb {
  background: #27272a;
  border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
  background: #3f3f46;
}

/* Responsive */
@media (max-width: 600px) {
  .form-grid {
    grid-template-columns: 1fr;
  }

  .stats {
    gap: 10px;
  }

  .stat-card {
    min-width: 80px;
    padding: 10px 14px;
  }

  header h1 {
    font-size: 1.7rem;
  }

  .grid {
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
  }

  .content-filter-bar {
    justify-content: flex-start;
  }
}

/* Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.card {
  animation: fadeIn 0.3s ease forwards;
}
</style>
</head>

<body>

<div class="container">
  <header>
    <h1>Minha Biblioteca</h1>
    <p>Gerencie sua coleção de mangás, manhwas e manhuas</p>
  </header>

  <!-- Search bar -->
  <div class="search-bar">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="searchInput" placeholder="Buscar por nome..." oninput="render()">
  </div>

  <button class="toggle-form-btn" onclick="toggleForm()">
    <span class="icon">+</span> Adicionar novo
  </button>

  <div class="form-wrapper" id="formWrapper">
    <form id="mangaForm">
      <div class="form-grid">
        <div class="form-group full-width">
          <label for="fieldTitle">Título</label>
          <input type="text" id="fieldTitle" placeholder="Ex: One Piece" required>
        </div>

        <div class="form-group">
          <label for="fieldRating">Nota</label>
          <select id="fieldRating">
            <option value="">Sem nota</option>
            <option value="10">10</option><option value="9">9</option><option value="8">8</option>
            <option value="7">7</option><option value="6">6</option><option value="5">5</option>
            <option value="4">4</option><option value="3">3</option><option value="2">2</option>
            <option value="1">1</option>
          </select>
        </div>

        <div class="form-group">
          <label for="fieldStatus">Status</label>
          <select id="fieldStatus">
            <option value="Lendo">Lendo</option>
            <option value="Completo">Completo</option>
            <option value="Dropado">Dropado</option>
            <option value="Planejo ler">Planejo ler</option>
          </select>
        </div>

        <div class="form-group">
          <label for="fieldType">Tipo</label>
          <select id="fieldType">
            <option value="Mangá">Mangá</option>
            <option value="Manhwa">Manhwa</option>
            <option value="Manhua">Manhua</option>
          </select>
        </div>

        <div class="form-group">
          <label>Classificação</label>
          <div class="checkbox-group">
            <div class="radio-wrapper">
              <input type="radio" name="contentRating" id="ratingSfw" value="sfw" checked>
              <label for="ratingSfw">SFW</label>
            </div>
            <div class="radio-wrapper">
              <input type="radio" name="contentRating" id="ratingNsfw" value="nsfw">
              <label for="ratingNsfw">NSFW (+18)</label>
            </div>
            <div class="radio-wrapper">
              <input type="radio" name="contentRating" id="ratingHentai" value="hentai">
              <label for="ratingHentai">Hentai</label>
            </div>
          </div>
        </div>

        <div class="form-group full-width">
          <label for="fieldImage">Capa</label>
          <input type="file" id="fieldImage" accept="image/*">
        </div>

        <div class="form-group full-width">
          <label for="fieldReview">Review</label>
          <textarea id="fieldReview" placeholder="Escreva sua opinião..."></textarea>
        </div>

        <div class="form-actions full-width">
          <button type="submit" class="btn-primary">Salvar</button>
          <button type="button" class="btn-secondary" onclick="cancelEdit()">Cancelar</button>
        </div>
      </div>
    </form>
  </div>

  <div class="stats" id="stats"></div>

  <!-- Filter toolbar -->
  <div class="filter-toolbar" id="filterToolbar"></div>

  <div class="grid" id="grid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
let data = JSON.parse(localStorage.getItem("mangas")) || [];
let editIndex = null;
let activeFilter = "Todos";
let contentFilter = "all"; // all, sfw, nsfw, hentai
let showNsfwCovers = JSON.parse(localStorage.getItem("showNsfwCovers")) || false;
let activeSort = "rating_desc"; // rating_desc, rating_asc, date_desc, date_asc, title_asc, title_desc

// Migrate old data: convert boolean nsfw to contentRating
data.forEach(function(m) {
  if (!m.contentRating) {
    m.contentRating = m.nsfw ? "nsfw" : "sfw";
  }
});
save();

// DOM references (avoiding global name conflicts)
var formEl = document.getElementById("mangaForm");
var fieldTitle = document.getElementById("fieldTitle");
var fieldRating = document.getElementById("fieldRating");
var fieldStatus = document.getElementById("fieldStatus");
var fieldType = document.getElementById("fieldType");
var fieldImage = document.getElementById("fieldImage");
var fieldReview = document.getElementById("fieldReview");
var searchInput = document.getElementById("searchInput");

formEl.addEventListener("submit", function(e) {
  e.preventDefault();
  var file = fieldImage.files[0];
  if (file) {
    var reader = new FileReader();
    reader.onload = function() { saveData(reader.result); };
    reader.readAsDataURL(file);
  } else {
    saveData(null);
  }
});

function toggleForm() {
  var wrapper = document.getElementById("formWrapper");
  var btn = document.querySelector(".toggle-form-btn");
  wrapper.classList.toggle("open");
  btn.classList.toggle("active");
}

function getContentRating() {
  var radios = document.getElementsByName("contentRating");
  for (var i = 0; i < radios.length; i++) {
    if (radios[i].checked) return radios[i].value;
  }
  return "sfw";
}

function setContentRating(val) {
  var radios = document.getElementsByName("contentRating");
  for (var i = 0; i < radios.length; i++) {
    radios[i].checked = (radios[i].value === val);
  }
}

function saveData(img) {
  var manga = {
    title: fieldTitle.value,
    rating: fieldRating.value || null,
    status: fieldStatus.value,
    type: fieldType.value,
    contentRating: getContentRating(),
    review: fieldReview.value,
    image: img || (editIndex !== null ? data[editIndex].image : ""),
    dateAdded: (editIndex !== null && data[editIndex].dateAdded) ? data[editIndex].dateAdded : Date.now()
  };

  if (editIndex !== null) {
    data[editIndex] = manga;
    editIndex = null;
    showToast("Título atualizado!");
  } else {
    data.push(manga);
    showToast("Título adicionado!");
  }

  save();
  render();
  formEl.reset();
  setContentRating("sfw");

  var wrapper = document.getElementById("formWrapper");
  var btn = document.querySelector(".toggle-form-btn");
  wrapper.classList.remove("open");
  btn.classList.remove("active");
}

function editItem(i) {
  var m = data[i];
  fieldTitle.value = m.title;
  fieldRating.value = m.rating || "";
  fieldStatus.value = m.status;
  fieldType.value = m.type;
  setContentRating(m.contentRating || "sfw");
  fieldReview.value = m.review || "";
  editIndex = i;

  var wrapper = document.getElementById("formWrapper");
  var btn = document.querySelector(".toggle-form-btn");
  wrapper.classList.add("open");
  btn.classList.add("active");
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelEdit() {
  editIndex = null;
  formEl.reset();
  setContentRating("sfw");
  var wrapper = document.getElementById("formWrapper");
  var btn = document.querySelector(".toggle-form-btn");
  wrapper.classList.remove("open");
  btn.classList.remove("active");
}

function removeItem(i) {
  if (confirm("Tem certeza que deseja excluir?")) {
    data.splice(i, 1);
    save();
    render();
    showToast("Título removido!");
  }
}

function save() {
  localStorage.setItem("mangas", JSON.stringify(data));
}

function showToast(msg) {
  var toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(function() {
    toast.classList.remove("show");
  }, 2500);
}

function getStatusClass(s) {
  var map = {
    'Lendo': 'status-lendo',
    'Completo': 'status-completo',
    'Dropado': 'status-dropado',
    'Planejo ler': 'status-planejo'
  };
  return map[s] || 'status-lendo';
}

function renderStats() {
  var statsEl = document.getElementById("stats");
  if (data.length === 0) {
    statsEl.innerHTML = "";
    return;
  }

  var total = data.length;
  var reading = data.filter(function(m) { return m.status === "Lendo"; }).length;
  var completed = data.filter(function(m) { return m.status === "Completo"; }).length;
  var rated = data.filter(function(m) { return m.rating; });
  var avgRating = rated.length ? (rated.reduce(function(a, m) { return a + Number(m.rating); }, 0) / rated.length).toFixed(1) : "\u2014";

  statsEl.innerHTML =
    '<div class="stat-card"><div class="stat-value">' + total + '</div><div class="stat-label">Total</div></div>' +
    '<div class="stat-card"><div class="stat-value">' + reading + '</div><div class="stat-label">Lendo</div></div>' +
    '<div class="stat-card"><div class="stat-value">' + completed + '</div><div class="stat-label">Completos</div></div>' +
    '<div class="stat-card"><div class="stat-value">' + avgRating + '</div><div class="stat-label">Nota média</div></div>';
}

function renderFilterToolbar() {
  var toolbar = document.getElementById("filterToolbar");
  if (data.length === 0) { toolbar.innerHTML = ""; return; }

  // ── Content-type pills ──────────────────────────────────────────────
  var contentFilters = [
    { key: "all",    label: "Todos",       cls: "" },
    { key: "sfw",    label: "SFW",         cls: "" },
    { key: "nsfw",   label: "NSFW (+18)",  cls: "nsfw-btn" },
    { key: "hentai", label: "Hentai",      cls: "hentai-btn" }
  ];

  var pillsHtml = contentFilters.map(function(f) {
    var active = contentFilter === f.key ? " active" : "";
    return '<button class="content-filter-btn ' + f.cls + active + '" onclick="setContentFilter(\'' + f.key + '\')">' + f.label + '</button>';
  }).join("");

  // ── Blur toggle ─────────────────────────────────────────────────────
  var blurLabel = showNsfwCovers ? "&#128065; Ocultar imagens" : "&#128065; Mostrar imagens";
  var blurActive = showNsfwCovers ? " unblurred" : "";
  var blurHtml = '<button class="blur-toggle-btn' + blurActive + '" onclick="toggleNsfwCovers()">' +
    '<span class="blur-icon">&#128274;</span>' + blurLabel + '</button>';

  // ── Status dropdown ──────────────────────────────────────────────────
  var statuses = ["Todos", "Lendo", "Completo", "Dropado", "Planejo ler"];
  var statusIcons = { "Todos": "📚", "Lendo": "📖", "Completo": "✅", "Dropado": "❌", "Planejo ler": "🔖" };
  var statusItems = statuses.map(function(s) {
    var sel = activeFilter === s ? " selected" : "";
    return '<button class="dropdown-item' + sel + '" onclick="setFilter(\'' + s + '\')">' +
      '<span class="dd-dot"></span>' + statusIcons[s] + ' ' + s + '</button>';
  }).join("");

  var statusLabel = activeFilter === "Todos" ? "📚 Status" : statusIcons[activeFilter] + " " + activeFilter;
  var statusActive = activeFilter !== "Todos" ? " active" : "";
  var statusHtml = '<div class="dropdown-wrapper">' +
    '<button class="dropdown-btn' + statusActive + '" id="statusDropBtn" onclick="toggleDropdown(\'statusDrop\')">' +
      statusLabel + ' <span class="dd-arrow">▼</span></button>' +
    '<div class="dropdown-menu" id="statusDrop">' + statusItems + '</div>' +
  '</div>';

  // ── Sort dropdown ────────────────────────────────────────────────────
  var sortOptions = [
    { key: "rating_desc",  label: "⭐ Nota: maior primeiro" },
    { key: "rating_asc",   label: "⭐ Nota: menor primeiro" },
    { key: "date_desc",    label: "🕐 Adicionado: recente" },
    { key: "date_asc",     label: "🕐 Adicionado: antigo" },
    { key: "title_asc",    label: "🔤 Título: A → Z" },
    { key: "title_desc",   label: "🔤 Título: Z → A" }
  ];
  var sortItems = sortOptions.map(function(o) {
    var sel = activeSort === o.key ? " selected" : "";
    return '<button class="dropdown-item' + sel + '" onclick="setSort(\'' + o.key + '\')">' +
      '<span class="dd-dot"></span>' + o.label + '</button>';
  }).join("");

  var currentSortLabel = (sortOptions.find(function(o){ return o.key === activeSort; }) || sortOptions[0]).label;
  var sortHtml = '<div class="dropdown-wrapper">' +
    '<button class="dropdown-btn active" id="sortDropBtn" onclick="toggleDropdown(\'sortDrop\')">' +
      currentSortLabel + ' <span class="dd-arrow">▼</span></button>' +
    '<div class="dropdown-menu" id="sortDrop">' + sortItems + '</div>' +
  '</div>';

  toolbar.innerHTML = pillsHtml + blurHtml + statusHtml + sortHtml;
}

function toggleDropdown(id) {
  // Close all first
  document.querySelectorAll('.dropdown-menu').forEach(function(m) {
    if (m.id !== id) { m.classList.remove('open'); }
    var btn = m.previousElementSibling;
    if (btn) btn.classList.remove('open');
  });
  var menu = document.getElementById(id);
  if (!menu) return;
  menu.classList.toggle('open');
  var btn = menu.previousElementSibling;
  if (btn) btn.classList.toggle('open');
}

// Close dropdowns when clicking outside
document.addEventListener('click', function(e) {
  if (!e.target.closest('.dropdown-wrapper')) {
    document.querySelectorAll('.dropdown-menu').forEach(function(m) { m.classList.remove('open'); });
    document.querySelectorAll('.dropdown-btn').forEach(function(b) { b.classList.remove('open'); });
  }
});

function setContentFilter(f) {
  contentFilter = f;
  render();
}

function setFilter(f) {
  activeFilter = f;
  // Close dropdown
  document.querySelectorAll('.dropdown-menu').forEach(function(m) { m.classList.remove('open'); });
  document.querySelectorAll('.dropdown-btn').forEach(function(b) { b.classList.remove('open'); });
  render();
}

function setSort(s) {
  activeSort = s;
  document.querySelectorAll('.dropdown-menu').forEach(function(m) { m.classList.remove('open'); });
  document.querySelectorAll('.dropdown-btn').forEach(function(b) { b.classList.remove('open'); });
  render();
}

function toggleNsfwCovers() {
  showNsfwCovers = !showNsfwCovers;
  localStorage.setItem("showNsfwCovers", JSON.stringify(showNsfwCovers));
  render();
}

function shouldBlur(m) {
  return (m.contentRating === "nsfw" || m.contentRating === "hentai") && !showNsfwCovers;
}

function escapeHtml(str) {
  var div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function render() {
  var grid = document.getElementById("grid");
  grid.innerHTML = "";

  renderStats();
  renderFilterToolbar();

  var searchTerm = searchInput.value.toLowerCase().trim();

  var filtered = data.filter(function(m) {
    // Content filter
    if (contentFilter === "sfw" && m.contentRating !== "sfw") return false;
    if (contentFilter === "nsfw" && m.contentRating !== "nsfw") return false;
    if (contentFilter === "hentai" && m.contentRating !== "hentai") return false;

    // By default (contentFilter === "all"), hide hentai unless specifically shown
    if (contentFilter === "all" && m.contentRating === "hentai") return false;

    // Status filter
    if (activeFilter !== "Todos" && m.status !== activeFilter) return false;

    // Search
    if (searchTerm && m.title.toLowerCase().indexOf(searchTerm) === -1) return false;

    return true;
  });

  // Apply sort
  filtered.sort(function(a, b) {
    switch (activeSort) {
      case "rating_desc": return (Number(b.rating) || 0) - (Number(a.rating) || 0);
      case "rating_asc":  return (Number(a.rating) || 0) - (Number(b.rating) || 0);
      case "date_desc":   return (b.dateAdded || 0) - (a.dateAdded || 0);
      case "date_asc":    return (a.dateAdded || 0) - (b.dateAdded || 0);
      case "title_asc":   return a.title.localeCompare(b.title, 'pt');
      case "title_desc":  return b.title.localeCompare(a.title, 'pt');
      default:            return (Number(b.rating) || 0) - (Number(a.rating) || 0);
    }
  });

  if (filtered.length === 0 && data.length === 0) {
    grid.innerHTML =
      '<div class="empty-state">' +
        '<div class="icon">&#128214;</div>' +
        '<p>Sua biblioteca está vazia.<br>Adicione seu primeiro mangá!</p>' +
      '</div>';
    return;
  }

  if (filtered.length === 0) {
    grid.innerHTML =
      '<div class="empty-state">' +
        '<div class="icon">&#128270;</div>' +
        '<p>Nenhum título encontrado com esses filtros.</p>' +
      '</div>';
    return;
  }

  var placeholder = "data:image/svg+xml," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="200" height="280" fill="%2318181b"><rect width="200" height="280"/><text x="100" y="140" text-anchor="middle" fill="%2352525b" font-size="14" font-family="sans-serif">Sem capa</text></svg>');

  for (var fi = 0; fi < filtered.length; fi++) {
    var m = filtered[fi];
    var i = data.indexOf(m);
    var div = document.createElement("div");
    div.className = "card";
    div.style.animationDelay = (fi * 0.05) + "s";

    var blurClass = shouldBlur(m) ? " blurred" : "";
    var blurOverlay = shouldBlur(m) ? '<div class="blur-overlay visible">+18</div>' : '';

    var contentBadgeHtml = "";
    if (m.contentRating === "nsfw") {
      contentBadgeHtml = '<span class="content-rating-badge nsfw-badge">NSFW</span>';
    } else if (m.contentRating === "hentai") {
      contentBadgeHtml = '<span class="content-rating-badge hentai-badge">HENTAI</span>';
    }

    var ratingBadge = m.rating ? '<span class="rating-badge">&#11088; ' + m.rating + '</span>' : '';

    var tagBadge = "";
    if (m.contentRating === "nsfw") {
      tagBadge = '<span class="badge nsfw">+18</span>';
    } else if (m.contentRating === "hentai") {
      tagBadge = '<span class="badge hentai">Hentai</span>';
    }

    var reviewHtml = "";
    if (m.review) {
      reviewHtml =
        '<div class="review-section">' +
          '<button class="review-toggle" onclick="toggleReview(' + i + ')">Ver review</button>' +
          '<div class="review-text" id="rev-' + i + '">' + escapeHtml(m.review) + '</div>' +
        '</div>';
    }

    div.innerHTML =
      '<div class="card-image">' +
        '<img src="' + (m.image || placeholder) + '" alt="' + escapeHtml(m.title) + '" loading="lazy" class="' + blurClass.trim() + '">' +
        '<span class="type-badge">' + escapeHtml(m.type) + '</span>' +
        ratingBadge +
        contentBadgeHtml +
        blurOverlay +
      '</div>' +
      '<div class="card-content">' +
        '<div class="card-title" title="' + escapeHtml(m.title) + '">' + escapeHtml(m.title) + '</div>' +
        '<div class="badges">' +
          tagBadge +
          '<span class="badge ' + getStatusClass(m.status) + '">' + escapeHtml(m.status) + '</span>' +
        '</div>' +
        reviewHtml +
        '<div class="actions">' +
          '<button class="btn-edit" onclick="editItem(' + i + ')">Editar</button>' +
          '<button class="btn-delete" onclick="removeItem(' + i + ')">Excluir</button>' +
        '</div>' +
      '</div>';

    grid.appendChild(div);
  }
}

function toggleReview(i) {
  var el = document.getElementById("rev-" + i);
  if (!el) return;
  var isOpen = el.style.display === "block";
  el.style.display = isOpen ? "none" : "block";
  el.previousElementSibling.textContent = isOpen ? "Ver review" : "Ocultar review";
}

render();
</script>

</body>
</html>
